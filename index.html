<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Escape Game</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>Escape from Threats</h1>

<!-- Game Area -->
<div id="gameArea">
    <img id="player" src="images/player.jpg" alt="Player">
    <img id="threat1" src="images/threat1.jpg" alt="Threat 1">
    <img id="threat2" src="images/threat2.jpg" alt="Threat 2">
</div>

<!-- Score and Message -->
<p>Score: <span id="score">0</span></p>
<p id="message"></p>

<!-- Restart Button -->
<button id="restartBtn">Restart Game</button>

<!-- Music -->
<audio id="bgMusic" src="sounds/bgmusic.mp3" loop></audio>
<audio id="defeatMusic" src="sounds/defeat.mp3"></audio>
<audio id="victoryMusic" src="sounds/victory.mp3"></audio>

<!-- Script -->
<script src="script.js"></script>

</body>
</html>
