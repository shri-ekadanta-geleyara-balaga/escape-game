<!DOCTYPE html>
<html lang="en">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Escape Game</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div id="gameArea">
    <img id="player" src="player.jpg">
    <img id="threat1" src="threat1.jpg">
    <img id="threat2" src="threat2.jpg">

    <!-- CONTROLS -->
    <div id="controls">
        <button data-dir="up">↑</button>
        <div>
            <button data-dir="left">←</button>
            <button data-dir="right">→</button>
        </div>
        <button data-dir="down">↓</button>
    </div>
</div>

<div id="ui">
    Score: <span id="score">0</span>
    <p id="message"></p>
    <button id="restartBtn">Restart</button>
</div>

<audio id="bgMusic" src="bgmusic.mp3" loop></audio>
<audio id="defeatMusic" src="defeat.mp3"></audio>
<audio id="victoryMusic" src="victory.mp3"></audio>

<script src="script.js"></script>
</body>
</html>
