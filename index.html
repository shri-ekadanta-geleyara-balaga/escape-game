<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Escape Game</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>Escape from Threats</h1>

<div id="gameArea">
    <img id="player" src="player.jpg">
    <img id="threat1" src="threat1.jpg">
    <img id="threat2" src="threat2.jpg">
</div>

<p>Score: <span id="score">0</span></p>
<p id="message"></p>

<button id="restartBtn">Restart Game</button>

<!-- MUSIC -->
<audio id="bgMusic" src="bgmusic.mp3" loop></audio>
<audio id="defeatMusic" src="defeat.mp3"></audio>
<audio id="victoryMusic" src="victory.mp3"></audio>

<script src="script.js"></script>

</body>
</html>
